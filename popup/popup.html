<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AdBlocker Stats</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h1>AdBlocker Status</h1>
        <div id="stats">
            <p>Geladene Regeln: <span id="rule-count">Lädt...</span></p>
            <p>Status: <span id="blocker-status">Lädt...</span></p>
        </div>
        <div class="controls">
            <button id="toggle-button">Ein-/Ausschalten</button>
            <button id="refresh-button">Aktualisieren</button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
