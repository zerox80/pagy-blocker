<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pagy Blocker</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <img src="/icons/icon48.png" alt="Pagy Blocker Logo" class="logo">
        <h1>Pagy Blocker</h1>
    </div>
    <div class="status-container">
        <span id="status-text">Aktiviert</span>
        <label class="switch">
            <input type="checkbox" id="enable-switch" checked>
            <span class="slider round"></span>
        </label>
    </div>
    <hr>
    <div class="stats">
        <p id="stats-display">Lade Statistiken...</p>
    </div>
    <script src="popup.js"></script>
</body>
</html>
