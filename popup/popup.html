<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pagy Blocker</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <img id="logo" src="../icons/icon128.png" alt="Pagy Blocker Logo" width="32" height="32">
            <h1>Pagy Blocker</h1>
        </header>

        <div class="toggle-container">
            <span id="status-text">Lade...</span>
            <label class="switch">
                <input type="checkbox" id="enable-switch" checked>
                <span class="slider round"></span>
            </label>
        </div>

        <div class="stats-container">
            <span class="stat-value" id="filter-count">...</span>
            <span class="stat-label">Aktive Filterregeln</span>
        </div>

    </div>
    <script src="popup.js"></script>
</body>
</html>
