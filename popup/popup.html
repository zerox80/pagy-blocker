<!DOCTYPE html>
<html>
<head>
    <title>Pagy Blocker</title>
    <link rel="stylesheet" type="text/css" href="popup.css">
    <meta charset="UTF-8">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="../icons/icon48.png" alt="Pagy Blocker Icon" class="logo">
            <h1>Pagy Blocker</h1>
        </div>

        <div class="stats-card">
            <div class="stat">
                <span id="page-blocked-count">...</span>
                <label>Auf dieser Seite</label>
            </div>
            <div class="stat-divider"></div>
            <div class="stat">
                <span id="total-blocked-count">...</span>
                <label>Insgesamt</label>
            </div>
        </div>

        <div class="domain-info">
            <span id="domain-name">Laden...</span>
        </div>

        <button id="toggle-blocker-btn" class="btn btn-toggle">Lade Status...</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
